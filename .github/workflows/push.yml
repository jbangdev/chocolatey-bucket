name: Push-jbang

on:
  push:
    tags:
      - '*'
    branches-ignore:
      - '**'

permissions:
  contents: read

jobs:
  push:
    uses: ./.github/workflows/choco.yml
    with:
      choco-package-name: jbang
      choco-source: https://push.chocolatey.org/
    secrets:
      choco-api-key: ${{ secrets.CHOCOLATEY_API_KEY }}
